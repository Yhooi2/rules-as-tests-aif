name: discipline-self-check

# Build-side enforcement of phase-research-coverage.md §1.7 — Recommendation
# self-discipline check. PRs touching discipline-bearing files must contain
# explicit ### §1.7 Forward-check applied + ### §1.7 Backward-check applied
# sections in PR description, OR a ### §1.7 Skipped: <reason ≥60 chars> marker.
#
# Build-side layer of the four-layer enforcement ladder (process rule + skill +
# pre-push + this workflow). See .claude/rules/phase-research-coverage.md §1.7.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - '.claude/rules/**'
      - 'packages/core/principles/**'
      - 'docs/meta-factory/EXECUTION-PLAN.md'
      - 'docs/meta-factory/prior-art-evaluations.md'
      - 'CLAUDE.md'
      - 'templates/**/*.md'
      - 'packages/core/templates/**/*.md'
      - 'packages/core/templates/**/*.template.md'

permissions:
  contents: read
  pull-requests: read

jobs:
  verify-pr-body-sections:
    name: §1.7 forward+backward sections present in PR description
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body for §1.7 sections or skip marker
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [ -z "${PR_BODY:-}" ]; then
            echo "::error::PR description is empty. PR touches discipline-bearing files."
            echo "Required: ### §1.7 Forward-check applied + ### §1.7 Backward-check applied"
            echo "Or: ### §1.7 Skipped: <rationale ≥60 chars>"
            echo "See: .claude/rules/phase-research-coverage.md §1.7"
            exit 1
          fi

          # Skip marker shortcuts the gate. Body must be ≥60 chars after the colon.
          if echo "$PR_BODY" | grep -qE '^### §1\.7 Skipped:.{60,}'; then
            echo "✅ §1.7 Skipped marker present with ≥60-char rationale."
            exit 0
          fi

          # Extract section bodies via awk: from "### §1.7 <Section>" to next "###"
          forward_body=$(echo "$PR_BODY" | awk '
            /^### §1\.7 Forward-check applied/ { capture=1; next }
            /^###/ { capture=0 }
            capture { print }
          ' | tr -d '[:space:]' | wc -c)

          backward_body=$(echo "$PR_BODY" | awk '
            /^### §1\.7 Backward-check applied/ { capture=1; next }
            /^###/ { capture=0 }
            capture { print }
          ' | tr -d '[:space:]' | wc -c)

          fail=0
          if [ "$forward_body" -lt 40 ]; then
            echo "::error::Missing or too-short \"### §1.7 Forward-check applied\" section (${forward_body} non-whitespace chars, need ≥40)."
            fail=1
          fi
          if [ "$backward_body" -lt 40 ]; then
            echo "::error::Missing or too-short \"### §1.7 Backward-check applied\" section (${backward_body} non-whitespace chars, need ≥40)."
            fail=1
          fi

          if [ "$fail" -eq 1 ]; then
            echo ""
            echo "PR touches discipline-bearing files (.claude/rules/, packages/core/principles/, EXECUTION-PLAN, prior-art-evaluations, CLAUDE.md, or shipped templates)."
            echo ""
            echo "PR description must include either:"
            echo "  ### §1.7 Forward-check applied"
            echo "  <body ≥40 chars enumerating which existing disciplines were checked>"
            echo ""
            echo "  ### §1.7 Backward-check applied"
            echo "  <body ≥40 chars enumerating the sweep of existing artefacts under the new rule's scope>"
            echo ""
            echo "OR a skip marker:"
            echo "  ### §1.7 Skipped: <reason ≥60 chars>"
            echo ""
            echo "Reference: .claude/rules/phase-research-coverage.md §1.7"
            echo "Skill:     .claude/skills/self-reflection/SKILL.md"
            exit 1
          fi

          echo "✅ §1.7 sections present and non-empty (forward: ${forward_body} chars, backward: ${backward_body} chars)."

          # Substance gate: Forward-check section must cite at least one file:line ref.
          # Catches generic prose like "Checked existing rules R1-R20 — compliant."
          # Regex: at-least-one non-whitespace path component ending in .ext:N
          forward_citations=$(echo "$PR_BODY" | awk '
            /^### §1\.7 Forward-check applied/ { capture=1; next }
            /^###/ { capture=0 }
            capture { print }
          ' | grep -cE '[^[:space:]]+\.[a-z]+:[0-9]+' || true)

          if [ "$forward_citations" -lt 1 ]; then
            echo "::error::Forward-check section contains 0 file:line citations (regex [^[:space:]]+\\.[a-z]+:[0-9]+)."
            echo "Substance arm (Wave 8.1) — §1.7 must cite specific evidence, not generic prose."
            echo "Example: 'packages/core/principles/02-paired-negative-test.test.ts:82 mutation arm verified'"
            echo "Bootstrap exemption: §1.7 Skipped marker with rationale ≥60 chars."
            exit 1
          fi
          echo "✅ Forward-check cites ${forward_citations} file:line reference(s)."

          # Substance gate: Backward-check section must cite at least one file:line ref
          # (parity with Forward-check Wave 8.1 substance arm). Catches quantifier
          # confabulation: prose like "all 13 X audited" without any verifiable citation.
          # Regex: at-least-one non-whitespace path component ending in .ext:N
          backward_citations=$(echo "$PR_BODY" | awk '
            /^### §1\.7 Backward-check applied/ { capture=1; next }
            /^###/ { capture=0 }
            capture { print }
          ' | grep -cE '[^[:space:]]+\.[a-z]+:[0-9]+' || true)

          if [ "$backward_citations" -lt 1 ]; then
            echo "::error::Backward-check section contains 0 file:line citations (regex [^[:space:]]+\\.[a-z]+:[0-9]+)."
            echo "Substance arm (Forward-check Wave 8.1 parity) — §1.7 Backward-check must cite specific evidence, not generic prose."
            echo "Example: 'packages/core/hooks/checks/s17.test.ts:16 all body-prose test cases ported to vitest (Wave 10.3)'"
            echo "Bootstrap exemption: §1.7 Skipped marker with rationale ≥60 chars."
            exit 1
          fi
          echo "✅ Backward-check cites ${backward_citations} file:line reference(s)."

      # Anti-fabrication arm (combo L2 block + L3 warn) — confirms the cited
      # file:line actually exists at HEAD, so a plausible-but-fake foo.ts:42 fails.
      # Pure logic + paired-negative tests: packages/core/hooks/checks/s17-pr-body.ts.
      # Security: runs tsx on the checked-out PR head — acceptable for this
      # single-maintainer, same-repo-PR project (base = staging).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - name: Install workspace deps (hoists tsx to root)
        run: npm install --silent
      - name: §1.7 citation-existence check (L2 block + L3 warn)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: npx tsx packages/core/hooks/checks/s17-pr-body-cli.ts

  sanity-stub-fails-substance:
    name: Sanity — Incident-1 stub §1.7 body MUST fail substance gate
    runs-on: ubuntu-latest
    steps:
      - name: Construct Incident-1 stub body and assert 0 citations
        run: |
          set -euo pipefail
          STUB_BODY=$(cat <<'EOF'
          ### §1.7 Forward-check applied
          Checked all existing rules R1-R20 — no conflicts with the new rule. Verified principles 01-09 pass. Checked SSOT entries — no overlapping capability area. Trigger sweep complete — no armed triggers fire. Doc-authority headers compliant.

          ### §1.7 Backward-check applied
          Complete sweep of existing artefacts under the new rule's scope performed. All artefacts compliant. No exemptions required.
          EOF
          )

          stub_citations=$(echo "$STUB_BODY" | awk '
            /^### §1\.7 Forward-check applied/ { capture=1; next }
            /^###/ { capture=0 }
            capture { print }
          ' | grep -cE '[^[:space:]]+\.[a-z]+:[0-9]+' || true)

          if [ "$stub_citations" -ne 0 ]; then
            echo "::error::Sanity broken — Incident-1 stub body matched ${stub_citations} citations (expected 0)."
            echo "The substance regex erroneously accepts generic prose. Substance gate has lost its paired-negative arm."
            exit 1
          fi
          echo "✅ Sanity: Incident-1 stub Forward-check correctly contains 0 file:line citations."

          stub_backward_citations=$(echo "$STUB_BODY" | awk '
            /^### §1\.7 Backward-check applied/ { capture=1; next }
            /^###/ { capture=0 }
            capture { print }
          ' | grep -cE '[^[:space:]]+\.[a-z]+:[0-9]+' || true)

          if [ "$stub_backward_citations" -ne 0 ]; then
            echo "::error::Sanity broken — Incident-1 stub Backward-check matched ${stub_backward_citations} citations (expected 0)."
            echo "The backward substance regex erroneously accepts generic prose."
            exit 1
          fi
          echo "✅ Sanity: Incident-1 stub Backward-check correctly contains 0 file:line citations."
          echo "   Both substance gates' paired-negative arms are intact."

  sanity-stub-backward-passes-with-citation:
    name: Sanity — §1.7 Backward-check with file:line citation MUST pass substance gate (Forward-check parity)
    runs-on: ubuntu-latest
    steps:
      - name: Construct stub with citation and assert backward citations ≥1
        run: |
          set -euo pipefail
          STUB_BODY=$(cat <<'EOF'
          ### §1.7 Forward-check applied
          packages/core/principles/01-rule-has-test.test.ts:12 checked — compliant with existing rule-has-test discipline. No forward conflicts.

          ### §1.7 Backward-check applied
          packages/core/hooks/checks/s17.test.ts:16 all body-prose test cases ported to vitest (Wave 10.3). Complete sweep performed.
          EOF
          )

          backward_citations=$(echo "$STUB_BODY" | awk '
            /^### §1\.7 Backward-check applied/ { capture=1; next }
            /^###/ { capture=0 }
            capture { print }
          ' | grep -cE '[^[:space:]]+\.[a-z]+:[0-9]+' || true)

          if [ "$backward_citations" -lt 1 ]; then
            echo "::error::Sanity broken — stub with Backward-check citation matched 0 (expected ≥1)."
            echo "The backward substance regex rejects a valid file:line citation. Positive arm is broken."
            exit 1
          fi
          echo "✅ Sanity: stub with Backward-check citation correctly passes (${backward_citations} citation(s) found)."
          echo "   Backward substance gate's positive arm is intact."
